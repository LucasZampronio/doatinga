services:
  db:
    image: postgres:15-alpine
    container_name: doatinga-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: doatinga
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./doatinga-api
    container_name: doatinga-api
    restart: always
    ports:
      - "3001:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_DATABASE=doatinga
      - DB_PASSWORD=password
      - JWT_SECRET=doatinga_secret_key_123
      - JWT_EXPIRES_IN=86400
    depends_on:
      - db

  web:
    build:
      context: ./doatinga-web
    container_name: doatinga-web
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
